<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <div class = "logo">
            <i class="fa-solid fa-cube brand-icon"></i>
            <h2>MyDash</h2>
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-item active">
                <i class="fa-regular fa-id-badge"></i>
                <span>Profile Info</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Account Security</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-regular fa-bell"></i>
                <span>Notifications</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-credit-card"></i>
                <span>Billing Details</span>
            </a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="top-header">
            <div class="header-text">
                <h2>Profile Information</h2>
                <p>Update your photo and personal details.</p>
            </div>
            <div class="user-shortcut">
                <i class="fa-solid fa-magnifying-glass"></i>
                <div class="user-avatar-small">A</div>
            </div>
        </header>
        <div class="content-wrapper">
            <div class="content-body">
                <div class="header-content">
                    <div class="btn-a">A</div>
                    <div class="upload">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Upload</span>
                    </div>
                    <div class="remove">
                        <i class="fa-solid fa-trash-can"></i>
                        <span>Remove</span>
                    </div>
                </div>
                <div class="profile-body">
                        <div class="name">
                            <div class="name1">
                                <div class="firstname">First Name</div>
                                <div class="firstnameblock">Alex</div>
                            </div>
                            <div class="name2">
                                    <div class="lastname">Last Name</div>
                                    <div class="lastnameblock">Smith</div>
                            </div>
                        </div>
                        <div class="address">
                            <div class="email">Email Address</div>
                            <div class="emailbox">alex.smith@example.com</div>
                        </div>
                        <div class="phonenumber">
                            <div class="phone">Phone Number</div>
                            <div class="phone-number"></div>
                        </div>
                        <div>
                            Receive updates and newsletters via email
                        </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
